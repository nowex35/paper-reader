name: Build & Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: macos-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="build.keychain"
          KEYCHAIN_PASS="actions"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -t 3600 "$KEYCHAIN"
          echo "$CERTIFICATE_P12" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          rm cert.p12

      - name: Store notarytool credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "naruhodo" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Build signed & notarized DMG
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
          NOTARY_PROFILE: naruhodo
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
        run: bash make_dmg.sh

      - name: Sign update with Sparkle EdDSA
        if: env.SPARKLE_EDDSA_KEY != ''
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          SPARKLE_VER="2.9.3"
          SIGN_TOOL="/tmp/sparkle/bin/sign_update"
          if [ ! -x "$SIGN_TOOL" ]; then
            mkdir -p /tmp/sparkle
            curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/$SPARKLE_VER/Sparkle-$SPARKLE_VER.tar.xz" \
              | tar xJ -C /tmp/sparkle
          fi
          SIGN_OUTPUT=$("$SIGN_TOOL" Naruhodo.zip --ed-key-file <(echo "$SPARKLE_EDDSA_KEY"))
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
          LENGTH=$(stat -f%z Naruhodo.zip)
          echo "ED_SIGNATURE=$ED_SIGNATURE" >> "$GITHUB_ENV"
          echo "ZIP_LENGTH=$LENGTH" >> "$GITHUB_ENV"

      - name: Upload DMG & zip to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          git fetch --tags --force
          TAG_TYPE=$(git cat-file -t "refs/tags/$TAG" 2>/dev/null || echo "commit")
          if [ "$TAG_TYPE" = "tag" ]; then
            CHANGELOG=$(git cat-file -p "refs/tags/$TAG" | sed '1,/^$/d' | sed '/^$/d')
          else
            CHANGELOG=""
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="バグ修正と改善"
          fi
          gh release create "$TAG" \
            --title "Naruhodo $TAG" \
            --notes "$CHANGELOG" \
            --draft \
            2>/dev/null || true
          gh release upload "$TAG" Naruhodo.dmg --clobber
          if [ -f Naruhodo.zip ]; then
            gh release upload "$TAG" Naruhodo.zip --clobber
          fi
          gh release edit "$TAG" --draft=false

      - name: Generate & publish appcast.xml
        if: env.ED_SIGNATURE != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          BUILD=$(git rev-list HEAD --count)

          TAG_TYPE=$(git cat-file -t "refs/tags/$TAG" 2>/dev/null || echo "commit")
          if [ "$TAG_TYPE" = "tag" ]; then
            CHANGELOG=$(git cat-file -p "refs/tags/$TAG" | sed '1,/^$/d' | sed '/^$/d')
          else
            CHANGELOG=""
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="バグ修正と改善"
          fi
          NOTES_HTML=$(echo "$CHANGELOG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g; s/^/<li>/; s/$/<\/li>/')
          NOTES_HTML="<ul>${NOTES_HTML}</ul>"

          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Naruhodo</title>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${BUILD}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <pubDate>$(date -R)</pubDate>
                <description><![CDATA[${NOTES_HTML}]]></description>
                <enclosure url="https://github.com/nowex35/paper-reader/releases/download/${TAG}/Naruhodo.zip"
                           sparkle:edSignature="${ED_SIGNATURE}"
                           length="${ZIP_LENGTH}"
                           type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF
          sed -i '' 's/^          //' appcast.xml

          cp appcast.xml /tmp/appcast.xml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-tmp
          git rm -rf . > /dev/null 2>&1 || true
          cp /tmp/appcast.xml appcast.xml
          git add appcast.xml
          git commit -m "appcast: $TAG"
          git push origin gh-pages-tmp:gh-pages --force
