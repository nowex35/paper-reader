name: Build & Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="build.keychain"
          KEYCHAIN_PASS="actions"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -t 3600 "$KEYCHAIN"
          echo "$CERTIFICATE_P12" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          rm cert.p12

      - name: Store notarytool credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "naruhodo" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Build signed & notarized DMG
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
          NOTARY_PROFILE: naruhodo
        run: bash make_dmg.sh

      - name: Upload DMG to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Create release if it doesn't exist yet
          gh release create "$TAG" \
            --title "Naruhodo $TAG" \
            --generate-notes \
            --draft \
            2>/dev/null || true
          # Upload (overwrite if re-run)
          gh release upload "$TAG" Naruhodo.dmg --clobber
          # Publish the draft
          gh release edit "$TAG" --draft=false
